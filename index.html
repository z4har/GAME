<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НОЧИ В РЕСТОРАНЕ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        h1 {
            color: #8B0000;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff0000;
        }
        #game {
            border: 4px solid #333;
            background: #000;
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .night {
            color: #FFD700;
        }
        .power {
            color: #00FF00;
        }
        .power.warning {
            color: #FF0000;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #FF0000;
            text-shadow: 0 0 20px #ff0000;
            display: none;
            text-align: center;
        }
        #message.win {
            color: #00FF00;
            text-shadow: 0 0 20px #00ff00;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #start-screen h2 {
            color: #8B0000;
            font-size: 48px;
            margin-bottom: 30px;
        }
        #start-screen button {
            background: #333;
            color: #fff;
            border: 2px solid #8B0000;
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        #start-screen button:hover {
            background: #8B0000;
        }
        .controls-info {
            margin-top: 30px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎪 НОЧИ В РЕСТОРАНЕ</h1>
    <div id="ui">
        <span class="night">НОЧЬ: <span id="night-num">1</span>/5</span>
        <span>ЧАС: <span id="hour">12</span>:00</span>
        <span class="power" id="power-display">ЭНЕРГИЯ: 100%</span>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="message"></div>
    
    <div id="start-screen">
        <h2>🎪 РЕСТОРАН</h2>
        <button onclick="startGame()">НАЧАТЬ</button>
        <div class="controls-info">
            <p>1-5 - Камеры | ПРОБЕЛ - Дверь | F - Фонарь</p>
            <p>Выживи 5 ночей! Следи за аниматрониками</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const ROOMS = [
            { name: "СЦЕНА", x: 300, y: 50 },
            { name: "КУХНЯ", x: 600, y: 150 },
            { name: "КОРИДОР", x: 100, y: 200 },
            { name: "КОМНАТА A", x: 50, y: 350 },
            { name: "КОМНАТА B", x: 650, y: 350 }
        ];

        const animatronics = [
            { name: "МИШКА", room: 0, moveProgress: 0, aggressive: 1, color: "#8B4513" },
            { name: "ЗАЙКА", room: 0, moveProgress: 0, aggressive: 2, color: "#FFB6C1" },
            { name: "КУРИЦА", room: 0, moveProgress: 0, aggressive: 1, color: "#FFD700" },
            { name: "ВОЛК", room: 0, moveProgress: 0, aggressive: 3, color: "#696969" }
        ];

        let currentRoom = 0;
        let doorClosed = false;
        let flashlightOn = false;
        let power = 100;
        let hour = 0;
        let minute = 0;
        let night = 1;
        let gameRunning = false;
        let gameOver = false;
        let gameWon = false;

        function startGame() {
            document.getElementById("start-screen").style.display = "none";
            resetGame();
            gameRunning = true;
            gameLoop();
        }

        function resetGame() {
            power = 100;
            hour = 0;
            minute = 0;
            currentRoom = 0;
            doorClosed = false;
            flashlightOn = false;
            gameOver = false;
            gameWon = false;
            
            animatronics.forEach((anim, i) => {
                anim.room = 0;
                anim.moveProgress = 0;
                anim.aggressive = i + 1;
            });
            
            updateUI();
            hideMessage();
        }

        function updateUI() {
            document.getElementById("night-num").textContent = night;
            document.getElementById("hour").textContent = hour;
            const powerEl = document.getElementById("power-display");
            powerEl.textContent = "ЭНЕРГИЯ: " + Math.floor(power) + "%";
            powerEl.className = power < 20 ? "power warning" : "power";
        }

        function showMessage(text, isWin = false) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.style.display = "block";
            msg.className = isWin ? "win" : "";
        }

        function hideMessage() {
            document.getElementById("message").style.display = "none";
        }

        function checkCollision(anim) {
            if (currentRoom === 3 && anim.room === 3 && !doorClosed) {
                return true;
            }
            if (currentRoom === 4 && anim.room === 4 && !doorClosed) {
                return true;
            }
            return false;
        }

        function update() {
            if (!gameRunning || gameOver || gameWon) return;

            minute += 1;
            if (minute >= 60) {
                minute = 0;
                hour += 1;
                
                if (hour >= 6) {
                    gameWon = true;
                    showMessage("ТЫ ВЫЖИЛ!", true);
                    setTimeout(() => {
                        if (night < 5) {
                            night++;
                            resetGame();
                        } else {
                            showMessage("ВСЕ НОЧИ ПРОЙДЕНЫ!", true);
                        }
                    }, 3000);
                }
            }

            if (doorClosed) power -= 0.15;
            if (flashlightOn) power -= 0.1;
            power -= 0.02;

            if (power <= 0) {
                power = 0;
                doorClosed = false;
                flashlightOn = false;
                gameOver = true;
                showMessage("НЕТ ЭНЕРГИИ!");
                return;
            }

            if (Math.random() < 0.02 * night) {
                const activeAnims = animatronics.filter(a => a.room < 4);
                if (activeAnims.length > 0) {
                    const anim = activeAnims[Math.floor(Math.random() * activeAnims.length)];
                    if (Math.random() < anim.aggressive * 0.3) {
                        anim.room = Math.min(4, anim.room + 1);
                    }
                }
            }

            for (const anim of animatronics) {
                if (checkCollision(anim)) {
                    gameOver = true;
                    showMessage(anim.name + " ПОЙМАЛ ТЕБЯ!");
                    return;
                }
            }

            updateUI();
        }

        function drawRoom(roomIndex, isCurrent) {
            const room = ROOMS[roomIndex];
            const size = isCurrent ? 180 : 100;
            
            ctx.fillStyle = isCurrent ? "#222" : "#1a1a1a";
            ctx.fillRect(room.x - size/2, room.y - size/2, size, size);
            
            ctx.strokeStyle = isCurrent ? "#ff0000" : "#444";
            ctx.lineWidth = isCurrent ? 3 : 1;
            ctx.strokeRect(room.x - size/2, room.y - size/2, size, size);

            ctx.fillStyle = isCurrent ? "#fff" : "#666";
            ctx.font = "12px monospace";
            ctx.textAlign = "center";
            ctx.fillText(room.name, room.x, room.y + 5);

            const animsInRoom = animatronics.filter(a => a.room === roomIndex);
            if (animsInRoom.length > 0) {
                const anim = animsInRoom[0];
                ctx.fillStyle = anim.color;
                ctx.beginPath();
                ctx.arc(room.x, room.y - 20, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(room.x - 5, room.y - 23, 4, 0, Math.PI * 2);
                ctx.arc(room.x + 5, room.y - 23, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(room.x - 5, room.y - 23, 2, 0, Math.PI * 2);
                ctx.arc(room.x + 5, room.y - 23, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function draw() {
            ctx.fillStyle = "#0a0a0a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < ROOMS.length; i++) {
                drawRoom(i, i === currentRoom);
            }

            ctx.fillStyle = "#333";
            ctx.fillRect(50, 300, 100, 150);
            ctx.fillStyle = doorClosed ? "#ff4444" : "#222";
            ctx.fillRect(50, 300, 100, 150);
            if (doorClosed) {
                ctx.fillStyle = "#8B0000";
                ctx.fillRect(60, 310, 80, 130);
            }

            ctx.fillStyle = "#333";
            ctx.fillRect(650, 300, 100, 150);
            ctx.fillStyle = "#222";
            ctx.fillRect(660, 310, 80, 130);

            ctx.fillStyle = "#444";
            ctx.fillRect(320, 380, 160, 80);
            ctx.fillStyle = flashlightOn ? "#ffff88" : "#222";
            ctx.fillRect(330, 390, 140, 60);

            ctx.fillStyle = "#fff";
            ctx.font = "14px monospace";
            ctx.textAlign = "left";
            
            ctx.fillStyle = "#FFD700";
            ctx.fillText("КАМЕРЫ:", 20, 30);
            for (let i = 0; i < ROOMS.length; i++) {
                ctx.fillStyle = currentRoom === i ? "#0f0" : "#666";
                ctx.fillText((i + 1) + ". " + ROOMS[i].name, 20, 50 + i * 20);
            }

            ctx.fillStyle = "#FFD700";
            ctx.fillText("АНИМАТРОНИКИ:", 600, 30);
            animatronics.forEach((anim, i) => {
                ctx.fillStyle = anim.color;
                ctx.fillText(anim.name, 600, 50 + i * 20);
            });

            if (flashlightOn) {
                ctx.fillStyle = "rgba(255, 255, 200, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (doorClosed) {
                ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                setTimeout(() => requestAnimationFrame(gameLoop), 100);
            }
        }

        document.addEventListener("keydown", (e) => {
            if (!gameRunning || gameOver || gameWon) return;
            
            const key = e.key.toLowerCase();
            if (key >= "1" && key <= "5") {
                currentRoom = parseInt(key) - 1;
            } else if (key === " ") {
                e.preventDefault();
                doorClosed = !doorClosed;
            } else if (key === "f") {
                flashlightOn = true;
            }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key.toLowerCase() === "f") {
                flashlightOn = false;
            }
        });

        draw();
    </script>
</body>
</html>
