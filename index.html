<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Платформер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            overflow: hidden;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 2px 2px 0 #fff;
        }
        #game-container {
            border: 4px solid #4A3728;
            border-radius: 4px;
            box-shadow: 0 8px 0 #2A1F14, 0 12px 20px rgba(0,0,0,0.3);
        }
        #game {
            display: block;
            background: #5C94FC;
        }
        .controls {
            margin-top: 20px;
            color: #333;
            font-size: 14px;
            text-align: center;
        }
        .controls span {
            display: inline-block;
            background: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            margin: 4px;
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <h1>🏃 ПЛАТФОРМЕР</h1>
    <div id="game-container">
        <canvas id="game" width="800" height="500"></canvas>
    </div>
    <div class="controls">
        <span>← → ДВИЖЕНИЕ</span>
        <span>ПРОБЕЛ ПРЫЖОК</span>
        <span>R РЕСТАРТ</span>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const JUMP_FORCE = -14;
        const MOVE_SPEED = 0.8;
        const MAX_SPEED = 6;

        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 40;
                this.velX = 0;
                this.velY = 0;
                this.onGround = false;
                this.facingRight = true;
                this.startX = x;
                this.startY = y;
            }

            reset() {
                this.x = this.startX;
                this.y = this.startY;
                this.velX = 0;
                this.velY = 0;
                this.onGround = false;
            }
        }

        class Platform {
            constructor(x, y, width, height, color = "#4A3728") {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = color;
            }
        }

        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.collected = false;
            }
        }

        const player = new Player(50, 350);

        const platforms = [
            new Platform(0, 460, 800, 40),
            new Platform(150, 380, 120, 20),
            new Platform(350, 320, 120, 20),
            new Platform(550, 260, 100, 20),
            new Platform(300, 200, 80, 20),
            new Platform(100, 150, 100, 20),
            new Platform(650, 180, 100, 20),
            new Platform(480, 380, 80, 20),
        ];

        const coins = [
            new Coin(200, 350),
            new Coin(400, 290),
            new Coin(600, 230),
            new Coin(340, 170),
            new Coin(150, 120),
            new Coin(700, 150),
            new Coin(520, 350),
        ];

        const keys = { left: false, right: false, jump: false };
        let score = 0;

        function onKeyDown(event) {
            const key = event.key.toLowerCase();
            if (key === "arrowleft") keys.left = true;
            else if (key === "arrowright") keys.right = true;
            else if (key === " ") { keys.jump = true; event.preventDefault(); }
            else if (key === "r") resetGame();
        }

        function onKeyUp(event) {
            const key = event.key.toLowerCase();
            if (key === "arrowleft") keys.left = false;
            else if (key === "arrowright") keys.right = false;
            else if (key === " ") keys.jump = false;
        }

        function resetGame() {
            player.reset();
            coins.forEach(coin => coin.collected = false);
            score = 0;
        }

        function checkCollision(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.width &&
                    rect1.x + rect1.width > rect2.x &&
                    rect1.y < rect2.y + rect2.height &&
                    rect1.y + rect1.height > rect2.y);
        }

        function update() {
            if (keys.left) {
                player.velX -= MOVE_SPEED;
                player.facingRight = false;
            }
            if (keys.right) {
                player.velX += MOVE_SPEED;
                player.facingRight = true;
            }

            player.velX = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.velX));
            player.velX *= FRICTION;
            player.velY += GRAVITY;

            if (keys.jump && player.onGround) {
                player.velY = JUMP_FORCE;
                player.onGround = false;
            }

            player.x += player.velX;
            for (const platform of platforms) {
                if (checkCollision(player, platform)) {
                    if (player.velX > 0) player.x = platform.x - player.width;
                    else if (player.velX < 0) player.x = platform.x + platform.width;
                    player.velX = 0;
                }
            }

            player.y += player.velY;
            player.onGround = false;
            for (const platform of platforms) {
                if (checkCollision(player, platform)) {
                    if (player.velY > 0) {
                        player.y = platform.y - player.height;
                        player.velY = 0;
                        player.onGround = true;
                    } else if (player.velY < 0) {
                        player.y = platform.y + platform.height;
                        player.velY = 0;
                    }
                }
            }

            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            if (player.y > canvas.height) resetGame();

            for (const coin of coins) {
                if (!coin.collected) {
                    const coinDist = Math.sqrt(
                        Math.pow(player.x + player.width / 2 - coin.x, 2) +
                        Math.pow(player.y + player.height / 2 - coin.y, 2)
                    );
                    if (coinDist < coin.radius + 20) {
                        coin.collected = true;
                        score += 10;
                    }
                }
            }
        }

        function drawPlayer() {
            const x = Math.floor(player.x);
            const y = Math.floor(player.y);
            const w = player.width;
            const h = player.height;

            ctx.fillStyle = "#E52521";
            ctx.fillRect(x + 4, y, w - 8, h - 12);

            ctx.fillStyle = "#FFDAB9";
            ctx.fillRect(x + 6, y + 2, 8, 8);
            ctx.fillRect(x + w - 14, y + 2, 8, 8);

            ctx.fillStyle = "#F5DEB3";
            ctx.fillRect(x + 4, y + h - 12, w - 8, 12);

            ctx.fillStyle = "#1E90FF";
            if (player.facingRight) {
                ctx.fillRect(x + 10, y + 8, 14, 10);
            } else {
                ctx.fillRect(x + 6, y + 8, 14, 10);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#5C94FC";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#70C030";
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

            for (const platform of platforms) {
                ctx.fillStyle = platform.color;
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                ctx.fillStyle = "#5D4037";
                ctx.fillRect(platform.x, platform.y + 4, platform.width, 4);
            }

            const currentTime = Date.now() / 1000;

            for (const coin of coins) {
                if (!coin.collected) {
                    const bounce = Math.sin(currentTime * 4 + coin.x) * 3;
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y + bounce, coin.radius, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.fillStyle = "#FFF8DC";
                    ctx.beginPath();
                    ctx.arc(coin.x - 3, coin.y + bounce - 3, 4, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }

            drawPlayer();

            ctx.fillStyle = "#FFF";
            ctx.font = "20px monospace";
            ctx.fillText("СЧЁТ: " + score, 20, 30);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener("keydown", onKeyDown);
        document.addEventListener("keyup", onKeyUp);

        gameLoop();
    </script>
</body>
</html>
