<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОБОРОНА ТАВЕРНЫ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #2d1b0e 0%, #1a0f07 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            color: #d4a574;
        }
        h1 {
            color: #ffd700;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }
        #game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        #game {
            border: 4px solid #8b4513;
            background: #3d2817;
        }
        #sidebar {
            width: 220px;
            background: #2a1a0f;
            border: 3px solid #8b4513;
            padding: 15px;
        }
        .panel {
            margin-bottom: 15px;
        }
        .panel h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 1px solid #8b4513;
            padding-bottom: 5px;
        }
        .tower-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #4a2a17;
            border: 2px solid #8b4513;
            color: #d4a574;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 13px;
            transition: all 0.2s;
        }
        .tower-btn:hover {
            background: #6a3a27;
            border-color: #ffd700;
        }
        .tower-btn.selected {
            background: #8b4513;
            border-color: #ffd700;
        }
        .tower-btn .cost {
            float: right;
            color: #ffd700;
        }
        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: #3d2817;
            border: 2px solid #8b4513;
            margin-bottom: 8px;
            border-radius: 5px;
        }
        .stat-row .icon {
            font-size: 24px;
        }
        .stat-row .label {
            flex: 1;
            margin-left: 10px;
            font-size: 14px;
        }
        .stat-row .value {
            font-size: 18px;
            font-weight: bold;
            min-width: 60px;
            text-align: right;
        }
        .stat-row.gold .value { color: #ffd700; }
        .stat-row.hp .value { color: #ff4444; }
        .stat-row.wave .value { color: #87ceeb; }
        
        #wave-info {
            text-align: center;
            padding: 10px;
            background: #4a2a17;
            border: 2px solid #8b4513;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        #wave-info .wave-num {
            font-size: 24px;
            color: #ffd700;
        }
        #start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(180deg, #3cb371 0%, #2e8b2e 100%);
            border: 2px solid #228b22;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            font-family: Georgia, serif;
            border-radius: 5px;
            text-shadow: 1px 1px 2px #000;
        }
        #start-btn:hover { background: linear-gradient(180deg, #228b22 0%, #1a6b1a 100%); }
        #start-btn:disabled { background: #555; border-color: #666; cursor: not-allowed; }
        
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            padding: 30px 60px;
            background: rgba(0,0,0,0.9);
            border: 4px solid #ffd700;
            display: none;
            z-index: 100;
            border-radius: 10px;
        }
        #message.win { color: #00ff00; }
        #message.lose { color: #ff0000; }
        
        .tower-desc {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <h1>🛡️ ОБОРОНА ТАВЕРНЫ</h1>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        <div id="sidebar">
            <div id="wave-info">
                <div>ВОЛНА</div>
                <div class="wave-num" id="wave-num">1 / 5</div>
            </div>
            <div class="panel">
                <h3>🏗️ ВЫБОР БАШНИ</h3>
                <button class="tower-btn" onclick="selectTower('crossbow')">
                    🏹 Арбалет<span class="cost">50</span>
                    <div class="tower-desc">Быстрый, одна цель</div>
                </button>
                <button class="tower-btn" onclick="selectTower('catapult')">
                    💣 Катапульта<span class="cost">100</span>
                    <div class="tower-desc">Медленный, сплеш</div>
                </button>
                <button class="tower-btn" onclick="selectTower('fortress')">
                    🏰 Замок<span class="cost">100</span>
                    <div class="tower-desc">Выпускает рыцарей</div>
                </button>
            </div>
            <div class="panel">
                <h3>📊 СТАТИСТИКА</h3>
                <div class="stat-row gold">
                    <span class="icon">💰</span>
                    <span class="label">Золото</span>
                    <span class="value" id="gold">150</span>
                </div>
                <div class="stat-row hp">
                    <span class="icon">❤️</span>
                    <span class="label">Здоровье</span>
                    <span class="value" id="hp">20</span>
                </div>
                <div class="stat-row wave">
                    <span class="icon">🌊</span>
                    <span class="label">Волна</span>
                    <span class="value" id="wave">1</span>
                </div>
            </div>
            <button id="start-btn" onclick="startWave()">НАЧАТЬ ВОЛНУ</button>
        </div>
    </div>
    <div id="message"></div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const TOWER_TYPES = {
            crossbow: { name: "Арбалет", cost: 50, range: 150, damage: 25, fireRate: 60, color: "#8B4513", splash: false },
            catapult: { name: "Катапульта", cost: 100, range: 200, damage: 40, fireRate: 360, color: "#696969", splash: true, splashRadius: 80 },
            fortress: { name: "Замок", cost: 100, range: 100, damage: 15, fireRate: 30, color: "#4a2a17", spawnKnight: true, spawnInterval: 900 }
        };

        const path = [
            {x: 0, y: 100}, {x: 150, y: 100}, {x: 150, y: 300}, 
            {x: 400, y: 300}, {x: 400, y: 150}, {x: 600, y: 150},
            {x: 600, y: 450}, {x: 300, y: 450}, {x: 300, y: 550}, {x: 750, y: 550}
        ];

        const towerSpots = [
            {x: 80, y: 180, occupied: false, tower: null},
            {x: 220, y: 220, occupied: false, tower: null},
            {x: 320, y: 380, occupied: false, tower: null},
            {x: 480, y: 230, occupied: false, tower: null},
            {x: 680, y: 370, occupied: false, tower: null}
        ];

        const waves = [
            { count: 8, interval: 80, hp: 30, speed: 1.5, reward: 10 },
            { count: 12, interval: 70, hp: 50, speed: 1.8, reward: 12 },
            { count: 15, interval: 60, hp: 80, speed: 2, reward: 15 },
            { count: 20, interval: 50, hp: 120, speed: 2.2, reward: 18 },
            { count: 25, interval: 40, hp: 180, speed: 2.5, reward: 20 }
        ];

        let orcs = [];
        let knights = [];
        let towers = [];
        let projectiles = [];
        let gold = 150;
        let hp = 20;
        let wave = 1;
        let currentWave = 0;
        let waveInProgress = false;
        let orcsToSpawn = 0;
        let spawnTimer = 0;
        let selectedTower = null;
        let gameOver = false;
        let gameWon = false;
        let baseOrcHp = waves[0].hp;

        function updateUI() {
            document.getElementById("gold").textContent = gold;
            document.getElementById("hp").textContent = hp;
            document.getElementById("wave").textContent = wave;
            document.getElementById("wave-num").textContent = wave + " / 5";
            document.getElementById("start-btn").disabled = waveInProgress || gameOver || gameWon;
        }

        function selectTower(type) {
            selectedTower = type;
            document.querySelectorAll(".tower-btn").forEach(btn => btn.classList.remove("selected"));
            event.target.classList.add("selected");
        }

        function startWave() {
            if (waveInProgress || wave > 5) return;
            currentWave = wave - 1;
            baseOrcHp = waves[currentWave].hp;
            orcsToSpawn = waves[currentWave].count;
            waveInProgress = true;
            updateUI();
        }

        function spawnOrc() {
            const w = waves[currentWave];
            orcs.push({
                x: path[0].x,
                y: path[0].y,
                hp: w.hp,
                maxHp: w.hp,
                speed: w.speed,
                reward: w.reward,
                pathIndex: 0
            });
        }

        function spawnKnight(tower) {
            const knightHp = baseOrcHp * 3;
            knights.push({
                x: tower.x,
                y: tower.y,
                hp: knightHp,
                maxHp: knightHp,
                speed: 1.2,
                damage: 30,
                target: null,
                tower: tower
            });
        }

        function placeTower(spot) {
            if (!selectedTower || spot.occupied) return;
            const type = TOWER_TYPES[selectedTower];
            if (gold < type.cost) return;

            gold -= type.cost;
            const tower = {
                x: spot.x,
                y: spot.y,
                type: selectedTower,
                ...type,
                cooldown: 0,
                spawnTimer: 0,
                angle: 0
            };
            towers.push(tower);
            spot.occupied = true;
            spot.tower = tower;
            updateUI();
        }

        function findTarget(tower) {
            let target = null;
            let minDist = tower.range;
            
            for (const orc of orcs) {
                const dist = Math.hypot(orc.x - tower.x, orc.y - tower.y);
                if (dist < minDist) {
                    minDist = dist;
                    target = orc;
                }
            }
            return target;
        }

        function findKnightTarget(knight) {
            let target = null;
            let minDist = 100;
            
            for (const orc of orcs) {
                const dist = Math.hypot(orc.x - knight.x, orc.y - knight.y);
                if (dist < minDist) {
                    minDist = dist;
                    target = orc;
                }
            }
            return target;
        }

        function update() {
            if (gameOver || gameWon) return;

            if (waveInProgress && orcsToSpawn > 0) {
                spawnTimer++;
                if (spawnTimer >= waves[currentWave].interval) {
                    spawnOrc();
                    orcsToSpawn--;
                    spawnTimer = 0;
                }
            }

            for (const tower of towers) {
                if (tower.spawnKnight) {
                    tower.spawnTimer++;
                    if (tower.spawnTimer >= tower.spawnInterval) {
                        spawnKnight(tower);
                        tower.spawnTimer = 0;
                    }
                }
            }

            for (let i = knights.length - 1; i >= 0; i--) {
                const knight = knights[i];
                const target = findKnightTarget(knight);
                
                if (target) {
                    const dist = Math.hypot(target.x - knight.x, target.y - knight.y);
                    
                    if (dist < 20) {
                        const knightDamage = knight.hp;
                        const orcDamage = target.hp;
                        
                        knight.hp -= orcDamage;
                        target.hp -= knightDamage;
                    } else {
                        const dx = target.x - knight.x;
                        const dy = target.y - knight.y;
                        knight.x += (dx / dist) * knight.speed;
                        knight.y += (dy / dist) * knight.speed;
                    }
                }
                
                if (knight.hp <= 0) {
                    knights.splice(i, 1);
                }
            }

            for (let i = orcs.length - 1; i >= 0; i--) {
                const orc = orcs[i];
                
                let blocked = false;
                for (const knight of knights) {
                    const dist = Math.hypot(orc.x - knight.x, orc.y - knight.y);
                    if (dist < 20) {
                        blocked = true;
                        break;
                    }
                }
                
                if (blocked) continue;
                
                const target = path[orc.pathIndex + 1];
                if (!target) {
                    hp--;
                    orcs.splice(i, 1);
                    updateUI();
                    if (hp <= 0) {
                        gameOver = true;
                        showMessage("ПОРАЖЕНИЕ!", false);
                    }
                    continue;
                }

                const dx = target.x - orc.x;
                const dy = target.y - orc.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < orc.speed) {
                    orc.pathIndex++;
                } else {
                    orc.x += (dx / dist) * orc.speed;
                    orc.y += (dy / dist) * orc.speed;
                }
            }

            for (const tower of towers) {
                if (tower.spawnKnight) continue;
                
                if (tower.cooldown > 0) tower.cooldown--;
                
                const target = findTarget(tower);
                if (target && tower.cooldown <= 0) {
                    tower.angle = Math.atan2(target.y - tower.y, target.x - tower.x);
                    
                    projectiles.push({
                        x: tower.x,
                        y: tower.y,
                        targetX: target.x,
                        targetY: target.y,
                        damage: tower.damage,
                        splash: tower.splash,
                        splashRadius: tower.splashRadius || 0,
                        speed: tower.splash ? 3 : 8,
                        color: tower.type === "catapult" ? "#ff6600" : "#fff"
                    });
                    tower.cooldown = tower.fireRate;
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                const dx = proj.targetX - proj.x;
                const dy = proj.targetY - proj.y;
                const dist = Math.hypot(dx, dy);

                if (dist < proj.speed) {
                    if (proj.splash) {
                        for (const orc of orcs) {
                            if (Math.hypot(orc.x - proj.targetX, orc.y - proj.targetY) < proj.splashRadius) {
                                orc.hp -= proj.damage;
                            }
                        }
                        drawExplosion(proj.targetX, proj.targetY, proj.splashRadius);
                    } else {
                        for (const orc of orcs) {
                            if (Math.hypot(orc.x - proj.targetX, orc.y - proj.targetY) < 30) {
                                orc.hp -= proj.damage;
                                break;
                            }
                        }
                    }
                    projectiles.splice(i, 1);
                } else {
                    proj.x += (dx / dist) * proj.speed;
                    proj.y += (dy / dist) * proj.speed;
                }
            }

            for (let i = orcs.length - 1; i >= 0; i--) {
                if (orcs[i].hp <= 0) {
                    gold += orcs[i].reward;
                    orcs.splice(i, 1);
                }
            }

            if (waveInProgress && orcsToSpawn === 0 && orcs.length === 0 && knights.length === 0) {
                waveInProgress = false;
                if (wave < 5) {
                    wave++;
                    gold += 50;
                } else {
                    gameWon = true;
                    showMessage("ПОБЕДА!", true);
                }
                updateUI();
            }
        }

        function drawExplosion(x, y, radius) {
            ctx.fillStyle = "rgba(255, 100, 0, 0.5)";
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawKnight(knight) {
            ctx.fillStyle = "#C0C0C0";
            ctx.beginPath();
            ctx.arc(knight.x, knight.y - 5, 12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "#808080";
            ctx.fillRect(knight.x - 15, knight.y - 5, 30, 20);
            
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.moveTo(knight.x, knight.y - 25);
            ctx.lineTo(knight.x - 5, knight.y - 35);
            ctx.lineTo(knight.x + 5, knight.y - 35);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(knight.x - 4, knight.y - 7, 2, 0, Math.PI * 2);
            ctx.arc(knight.x + 4, knight.y - 7, 2, 0, Math.PI * 2);
            ctx.fill();

            const hpPercent = knight.hp / knight.maxHp;
            ctx.fillStyle = "#333";
            ctx.fillRect(knight.x - 15, knight.y - 30, 30, 5);
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(knight.x - 15, knight.y - 30, 30 * hpPercent, 5);
        }

        function draw() {
            ctx.fillStyle = "#3d2817";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#5a3d2a";
            ctx.lineWidth = 40;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.stroke();

            ctx.fillStyle = "#2d1b0e";
            ctx.beginPath();
            ctx.arc(path[path.length - 1].x, path[path.length - 1].y, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#ffd700";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = "#ffd700";
            ctx.font = "28px Georgia";
            ctx.textAlign = "center";
            ctx.fillText("🏰", path[path.length - 1].x, path[path.length - 1].y + 10);

            for (const spot of towerSpots) {
                ctx.fillStyle = spot.occupied ? "#4a2a17" : "#6a4a37";
                ctx.strokeStyle = spot.occupied ? "#8b4513" : "#a08060";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(spot.x, spot.y, 35, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                if (!spot.occupied) {
                    ctx.fillStyle = "#a08060";
                    ctx.font = "24px Georgia";
                    ctx.fillText("+", spot.x, spot.y + 8);
                }
            }

            for (const tower of towers) {
                ctx.fillStyle = tower.color;
                
                if (tower.type === "fortress") {
                    ctx.fillRect(tower.x - 20, tower.y - 25, 40, 50);
                    ctx.fillStyle = "#8B4513";
                    ctx.fillRect(tower.x - 15, tower.y - 35, 30, 15);
                    ctx.fillStyle = "#333";
                    ctx.fillRect(tower.x - 8, tower.y - 10, 16, 25);
                } else if (tower.type === "catapult") {
                    ctx.beginPath();
                    ctx.arc(tower.x, tower.y, 22, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = "#4a4a4a";
                    ctx.fillRect(tower.x - 10, tower.y - 30, 20, 15);
                } else {
                    ctx.beginPath();
                    ctx.arc(tower.x, tower.y, 20, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.save();
                ctx.translate(tower.x, tower.y);
                ctx.rotate(tower.angle);
                ctx.fillStyle = "#8B4513";
                if (tower.type === "catapult") {
                    ctx.fillRect(0, -5, 25, 10);
                } else if (tower.type === "crossbow") {
                    ctx.fillRect(0, -2, 30, 4);
                    ctx.fillRect(25, -8, 4, 16);
                }
                ctx.restore();

                ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(tower.x, tower.y, tower.range, 0, Math.PI * 2);
                ctx.stroke();
            }

            for (const knight of knights) {
                drawKnight(knight);
            }

            for (const orc of orcs) {
                ctx.fillStyle = "#228B22";
                ctx.beginPath();
                ctx.arc(orc.x, orc.y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#8B4513";
                ctx.beginPath();
                ctx.arc(orc.x, orc.y - 10, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#8B0000";
                ctx.beginPath();
                ctx.arc(orc.x - 4, orc.y - 3, 3, 0, Math.PI * 2);
                ctx.arc(orc.x + 4, orc.y - 3, 3, 0, Math.PI * 2);
                ctx.fill();

                const hpPercent = orc.hp / orc.maxHp;
                ctx.fillStyle = "#333";
                ctx.fillRect(orc.x - 15, orc.y - 25, 30, 5);
                ctx.fillStyle = hpPercent > 0.5 ? "#00ff00" : "#ff0000";
                ctx.fillRect(orc.x - 15, orc.y - 25, 30 * hpPercent, 5);
            }

            for (const proj of projectiles) {
                ctx.fillStyle = proj.color;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.splash ? 8 : 4, 0, Math.PI * 2);
                ctx.fill();
            }

            if (selectedTower) {
                canvas.onclick = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    for (const spot of towerSpots) {
                        if (Math.hypot(x - spot.x, y - spot.y) < 35 && !spot.occupied) {
                            placeTower(spot);
                            break;
                        }
                    }
                };
            }
        }

        function showMessage(text, isWin) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = isWin ? "win" : "lose";
            msg.style.display = "block";
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
        updateUI();
    </script>
</body>
</html>
